<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f;
  --surface: rgba(12, 17, 28, 0.7);
  --surface-hover: rgba(18, 25, 42, 0.85);
  --border: rgba(255,255,255,0.04);
  --border-hover: rgba(56,189,248,0.15);
  --text-1: #f0f4f8;
  --text-2: #64748b;
  --text-3: #334155;
  --accent: #38bdf8;
  --accent-dim: rgba(56,189,248,0.08);
  --glow: rgba(56,189,248,0.06);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.08);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.04) 0%, transparent 70%),
    radial-gradient(circle at 20% 80%, rgba(99,102,241,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 72px 24px 60px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeIn 0.8s ease-out;
}

.header .tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(56,189,248,0.12);
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 20px;
}

.header h1 {
  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-1);
  line-height: 1.3;
  margin-bottom: 10px;
}

.header h1 span { color: var(--accent); }

.header .sub {
  font-size: 0.85rem;
  color: var(--text-2);
  font-weight: 300;
  letter-spacing: 0.3px;
}

/* Search & Filter */
.search-section {
  margin-bottom: 40px;
  animation: fadeIn 0.8s ease-out 0.15s both;
}

.search-box {
  position: relative;
  margin-bottom: 14px;
}

.search-box svg {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--text-3);
  pointer-events: none;
  transition: color 0.2s;
}

.search-box input {
  width: 100%;
  padding: 14px 16px 14px 46px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-1);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: all 0.25s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.search-box input::placeholder { color: var(--text-3); }

.search-box input:focus {
  border-color: var(--border-hover);
  box-shadow: 0 0 0 3px var(--accent-dim), 0 8px 32px rgba(0,0,0,0.15);
}

.search-box input:focus ~ svg { color: var(--accent); }

/* Filter tabs */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filter-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  user-select: none;
}

.filter-chip:hover {
  border-color: var(--border-hover);
  color: var(--text-1);
}

.filter-chip.active {
  background: var(--accent-dim);
  border-color: rgba(56,189,248,0.25);
  color: var(--accent);
}

.filter-chip .chip-dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

.filter-chip.active .chip-dot { background: var(--accent); }
.filter-chip:not(.active) .chip-dot { background: var(--text-3); }

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
  margin-bottom: 32px;
  animation: fadeIn 0.8s ease-out 0.2s both;
}

/* Stats bar */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  animation: fadeIn 0.6s ease-out 0.25s both;
}

.stats-bar .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-3);
}

.stats-bar .count em {
  font-style: normal;
  color: var(--accent);
  font-weight: 600;
}

.stats-bar .mode-label {
  font-size: 0.7rem;
  color: var(--text-3);
  font-weight: 300;
}

/* Report list */
.reports {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.report-item {
  animation: slideUp 0.5s ease-out both;
}

.report-item:nth-child(1) { animation-delay: 0.15s; }
.report-item:nth-child(2) { animation-delay: 0.25s; }
.report-item:nth-child(3) { animation-delay: 0.35s; }
.report-item:nth-child(4) { animation-delay: 0.45s; }
.report-item:nth-child(5) { animation-delay: 0.55s; }

.report-link {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-decoration: none;
  color: var(--text-1);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.report-link:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 0 0 1px var(--border-hover);
}

.report-link:active { transform: translateY(0); }

.report-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 6px 10px;
  border-radius: 8px;
  text-align: center;
  line-height: 1.4;
  min-width: 56px;
}

.report-date .day {
  display: block;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-1);
}

.report-title {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-1);
  line-height: 1.4;
}

.report-title .weekday {
  display: block;
  font-size: 0.75rem;
  color: var(--text-2);
  font-weight: 300;
  margin-top: 2px;
}

.report-arrow {
  color: var(--text-3);
  font-size: 1.1rem;
  transition: all 0.25s;
}

.report-link:hover .report-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

.latest {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(52,211,153,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  display: inline-block;
  vertical-align: middle;
}

/* Search results */
.search-results {
  display: none;
}

.search-results.active { display: block; }
.reports.hidden { display: none; }

.result-group {
  margin-bottom: 24px;
}

.result-group-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
  padding-left: 4px;
}

.result-group-title .icon {
  margin-right: 6px;
}

.result-card {
  display: block;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 6px;
  text-decoration: none;
  color: var(--text-1);
  transition: all 0.25s;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: slideUp 0.4s ease-out both;
}

.result-card:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
}

.result-card .result-title {
  font-size: 0.9rem;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 6px;
}

.result-card .result-title mark {
  background: rgba(56,189,248,0.2);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 2px;
}

.result-card .result-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.result-card .result-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 8px;
  border-radius: 4px;
}

.result-card .result-tags {
  display: flex;
  gap: 6px;
}

.result-card .result-tag {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--purple-dim);
  color: var(--purple);
  border: 1px solid rgba(167,139,250,0.12);
}

.result-card .result-arrow {
  margin-left: auto;
  color: var(--text-3);
  font-size: 0.9rem;
  transition: all 0.2s;
}

.result-card:hover .result-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

.result-card .result-desc {
  font-size: 0.82rem;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 8px;
}

.result-card .result-desc mark {
  background: rgba(56,189,248,0.2);
  color: var(--accent);
  border-radius: 2px;
  padding: 0 2px;
}

.result-card .result-stars {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: #fbbf24;
}

.result-card .result-lang {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--text-2);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  display: none;
}

.empty-state.active { display: block; }

.empty-state .empty-icon {
  font-size: 2.5rem;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 0.9rem;
  color: var(--text-3);
  font-weight: 300;
}

.empty-state .hint {
  font-size: 0.78rem;
  color: var(--text-3);
  margin-top: 8px;
  opacity: 0.6;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 64px;
  animation: fadeIn 0.8s ease-out 0.6s both;
}

.footer .line {
  width: 32px;
  height: 1px;
  background: var(--border-hover);
  margin: 0 auto 20px;
}

.footer .author {
  font-size: 0.78rem;
  color: var(--text-2);
  font-weight: 400;
  margin-bottom: 8px;
  line-height: 1.6;
}

.footer .author .name {
  color: var(--text-1);
  font-weight: 500;
}

.footer .author .dy {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  font-weight: 500;
}

.footer .update-info {
  font-size: 0.7rem;
  color: var(--text-3);
  font-weight: 300;
  letter-spacing: 0.5px;
}

.footer .update-info span {
  color: var(--text-2);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 56px 16px 48px; }
  .report-link { padding: 16px 16px; gap: 12px; }
  .report-date { min-width: 48px; padding: 5px 8px; }
  .report-date .day { font-size: 1rem; }
  .search-box input { padding: 12px 14px 12px 42px; font-size: 0.85rem; }
  .filter-chip { padding: 6px 10px; font-size: 0.65rem; }
  .result-card { padding: 14px 16px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="tag">AI Daily Report</div>
    <h1>AI <span>应用新闻</span>日报</h1>
    <p class="sub">每日精选 AI 要闻 · GitHub 热榜 · 趋势洞察</p>
  </div>

  <div class="search-section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="模糊搜索：输入关键词，如 支付 Agent 开源..." autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" data-filter="all"><span class="chip-dot"></span>全部日期</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="stats-bar" id="statsBar">
    <span class="count">共 <em id="totalCount">0</em> 期日报</span>
    <span class="mode-label" id="modeLabel"></span>
  </div>

  <!-- Report list (default view) -->
  <div class="reports" id="reportList"></div>

  <!-- Search results -->
  <div class="search-results" id="searchResults"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">&#x1F50D;</div>
    <p>未找到匹配结果</p>
    <p class="hint">试试其他关键词或切换日期筛选</p>
  </div>

  <div class="footer">
    <div class="line"></div>
    <p class="author"><span class="name">Sino</span> - 自我进化论忠实拥护 - dy：<span class="dy">36394491368</span></p>
    <p class="update-info">每日 <span>09:00</span> 自动更新 · Powered by AI</p>
  </div>

</div>

<script>
(async function() {
  let searchData = null;
  let activeFilter = 'all';
  let searchTimeout = null;

  const reportList = document.getElementById('reportList');
  const searchResults = document.getElementById('searchResults');
  const emptyState = document.getElementById('emptyState');
  const searchInput = document.getElementById('searchInput');
  const filterRow = document.getElementById('filterRow');
  const totalCount = document.getElementById('totalCount');
  const modeLabel = document.getElementById('modeLabel');

  // Load search index
  try {
    const resp = await fetch('./search-index.json');
    searchData = await resp.json();
  } catch(e) {
    console.error('Failed to load search index:', e);
    return;
  }

  // Build date filter chips
  const reports = searchData.reports;
  reports.forEach((r, i) => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.filter = r.date;
    const d = new Date(r.date);
    chip.innerHTML = '<span class="chip-dot"></span>' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    if (i === 0) chip.innerHTML += ' <span style="color:var(--green);font-size:0.55rem;margin-left:4px;">NEW</span>';
    filterRow.appendChild(chip);
  });

  // Render report list
  function renderReports(filter) {
    let filtered = reports;
    if (filter !== 'all') {
      filtered = reports.filter(r => r.date === filter);
    }

    totalCount.textContent = filtered.length;
    reportList.innerHTML = '';

    if (filtered.length === 0) {
      reportList.classList.add('hidden');
      emptyState.classList.add('active');
      return;
    }

    emptyState.classList.remove('active');
    reportList.classList.remove('hidden');

    filtered.forEach((r, idx) => {
      const d = new Date(r.date);
      const item = document.createElement('div');
      item.className = 'report-item';
      item.style.animationDelay = (0.1 + idx * 0.1) + 's';

      const latestBadge = idx === 0 && filter === 'all' ? ' <span class="latest">LATEST</span>' : '';

      item.innerHTML = `
        <a href="${r.file}" class="report-link">
          <div class="report-date">
            <span class="day">${d.getDate()}</span>
            ${String(d.getMonth()+1).padStart(2,'0')}
          </div>
          <div class="report-title">
            AI应用新闻日报${latestBadge}
            <span class="weekday">${r.weekday} · ${r.news.length}条要闻 · ${r.github.length}个项目</span>
          </div>
          <div class="report-arrow">→</div>
        </a>`;
      reportList.appendChild(item);
    });
  }

  // Filter chip click
  filterRow.addEventListener('click', function(e) {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;

    filterRow.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;

    // Clear search
    searchInput.value = '';
    searchResults.classList.remove('active');
    searchResults.innerHTML = '';
    emptyState.classList.remove('active');
    reportList.classList.remove('hidden');
    modeLabel.textContent = '';

    renderReports(activeFilter);
  });

  // Fuzzy search: split query into keywords, all must match (OR within each field)
  function fuzzyMatch(text, keywords) {
    const lower = text.toLowerCase();
    return keywords.some(kw => lower.includes(kw));
  }

  function fuzzyMatchAll(text, keywords) {
    const lower = text.toLowerCase();
    return keywords.every(kw => lower.includes(kw));
  }

  function highlightText(text, keywords) {
    if (!keywords || keywords.length === 0) return text;
    // Highlight all keywords
    let result = text;
    keywords.forEach(kw => {
      const regex = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      result = result.replace(regex, '<mark>$1</mark>');
    });
    return result;
  }

  function doSearch(rawQuery) {
    const query = rawQuery.trim();
    if (!query) {
      searchResults.classList.remove('active');
      searchResults.innerHTML = '';
      emptyState.classList.remove('active');
      reportList.classList.remove('hidden');
      modeLabel.textContent = '';
      renderReports(activeFilter);
      return;
    }

    // Split into multiple keywords (space-separated)
    const keywords = query.toLowerCase().split(/\s+/).filter(k => k.length > 0);

    reportList.classList.add('hidden');
    emptyState.classList.remove('active');
    searchResults.classList.add('active');
    searchResults.innerHTML = '';

    let filteredReports = reports;
    if (activeFilter !== 'all') {
      filteredReports = reports.filter(r => r.date === activeFilter);
    }

    let newsResults = [];
    let ghResults = [];

    filteredReports.forEach(r => {
      r.news.forEach(n => {
        // Build a combined text field for fuzzy matching
        const combined = [n.title, n.summary || '', ...n.tags].join(' ').toLowerCase();
        // Match if ANY keyword is found (fuzzy OR)
        if (fuzzyMatch(combined, keywords)) {
          newsResults.push({ ...n, date: r.date, weekday: r.weekday, file: r.file });
        }
      });
      r.github.forEach(g => {
        const combined = [g.name, g.desc, g.lang].join(' ').toLowerCase();
        if (fuzzyMatch(combined, keywords)) {
          ghResults.push({ ...g, date: r.date, weekday: r.weekday, file: r.file });
        }
      });
    });

    const total = newsResults.length + ghResults.length;
    modeLabel.textContent = '搜索模式';
    totalCount.innerHTML = '找到 <em>' + total + '</em> 条结果';

    if (total === 0) {
      emptyState.classList.add('active');
      return;
    }

    let delay = 0;

    if (newsResults.length > 0) {
      const group = document.createElement('div');
      group.className = 'result-group';
      group.innerHTML = '<div class="result-group-title"><span class="icon">&#x1F4F0;</span>AI 要闻 (' + newsResults.length + ')</div>';

      newsResults.forEach(n => {
        const card = document.createElement('a');
        card.className = 'result-card';
        card.href = n.url;
        card.target = '_blank';
        card.rel = 'noopener';
        card.style.animationDelay = (delay * 0.05) + 's';
        delay++;

        const tagsHtml = n.tags.map(t => '<span class="result-tag">' + t + '</span>').join('');
        const summaryHtml = n.summary ? '<div class="result-desc">' + highlightText(n.summary, keywords) + '</div>' : '';
        card.innerHTML = `
          <div class="result-title">${highlightText(n.title, keywords)}</div>
          ${summaryHtml}
          <div class="result-meta">
            <span class="result-date">${n.date}</span>
            <div class="result-tags">${tagsHtml}</div>
            <span class="result-arrow">→</span>
          </div>`;
        group.appendChild(card);
      });

      searchResults.appendChild(group);
    }

    if (ghResults.length > 0) {
      const group = document.createElement('div');
      group.className = 'result-group';
      group.innerHTML = '<div class="result-group-title"><span class="icon">&#x1F4BB;</span>GitHub 项目 (' + ghResults.length + ')</div>';

      ghResults.forEach(g => {
        const card = document.createElement('a');
        card.className = 'result-card';
        card.href = g.url;
        card.target = '_blank';
        card.rel = 'noopener';
        card.style.animationDelay = (delay * 0.05) + 's';
        delay++;

        card.innerHTML = `
          <div class="result-title">${highlightText(g.name, keywords)}</div>
          <div class="result-desc">${highlightText(g.desc, keywords)}</div>
          <div class="result-meta">
            <span class="result-date">${g.date}</span>
            <span class="result-stars">&#9733; ${g.stars}</span>
            <span class="result-lang">${g.lang}</span>
            <span class="result-arrow">→</span>
          </div>`;
        group.appendChild(card);
      });

      searchResults.appendChild(group);
    }
  }

  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => doSearch(this.value), 200);
  });

  // Initial render
  renderReports('all');
})();
</script>
</body>
</html>
