<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06090f;
  --surface: rgba(12, 17, 28, 0.7);
  --surface-hover: rgba(18, 25, 42, 0.85);
  --border: rgba(255,255,255,0.04);
  --border-hover: rgba(56,189,248,0.15);
  --text-1: #f0f4f8;
  --text-2: #64748b;
  --text-3: #334155;
  --accent: #38bdf8;
  --accent-dim: rgba(56,189,248,0.08);
  --glow: rgba(56,189,248,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(56,189,248,0.04) 0%, transparent 70%),
    radial-gradient(circle at 20% 80%, rgba(99,102,241,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Grid noise texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 80px 24px 100px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 64px;
  animation: fadeIn 0.8s ease-out;
}

.header .tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(56,189,248,0.12);
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 24px;
}

.header h1 {
  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-1);
  line-height: 1.3;
  margin-bottom: 12px;
}

.header h1 span {
  color: var(--accent);
}

.header .sub {
  font-size: 0.85rem;
  color: var(--text-2);
  font-weight: 300;
  letter-spacing: 0.3px;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
  margin-bottom: 40px;
  animation: fadeIn 0.8s ease-out 0.2s both;
}

/* Report list */
.reports {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.report-item {
  animation: slideUp 0.5s ease-out both;
}

.report-item:nth-child(1) { animation-delay: 0.15s; }
.report-item:nth-child(2) { animation-delay: 0.25s; }
.report-item:nth-child(3) { animation-delay: 0.35s; }
.report-item:nth-child(4) { animation-delay: 0.45s; }
.report-item:nth-child(5) { animation-delay: 0.55s; }

.report-link {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-decoration: none;
  color: var(--text-1);
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.report-link:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2), 0 0 0 1px var(--border-hover);
}

.report-link:active {
  transform: translateY(0);
}

/* Date block */
.report-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 6px 10px;
  border-radius: 8px;
  text-align: center;
  line-height: 1.4;
  min-width: 56px;
}

.report-date .day {
  display: block;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-1);
}

/* Title */
.report-title {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-1);
  line-height: 1.4;
}

.report-title .weekday {
  display: block;
  font-size: 0.75rem;
  color: var(--text-2);
  font-weight: 300;
  margin-top: 2px;
}

/* Arrow */
.report-arrow {
  color: var(--text-3);
  font-size: 1.1rem;
  transition: all 0.25s;
}

.report-link:hover .report-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

/* Latest badge */
.latest {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #34d399;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  display: inline-block;
  vertical-align: middle;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 72px;
  animation: fadeIn 0.8s ease-out 0.6s both;
}

.footer .line {
  width: 32px;
  height: 1px;
  background: var(--border-hover);
  margin: 0 auto 20px;
}

.footer p {
  font-size: 0.72rem;
  color: var(--text-3);
  font-weight: 300;
  letter-spacing: 0.5px;
}

.footer p span {
  color: var(--text-2);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 60px 16px 80px; }
  .report-link { padding: 16px 16px; gap: 12px; }
  .report-date { min-width: 48px; padding: 5px 8px; }
  .report-date .day { font-size: 1rem; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="tag">AI Daily Report</div>
    <h1>AI <span>应用新闻</span>日报</h1>
    <p class="sub">每日精选 AI 要闻 · GitHub 热榜 · 趋势洞察</p>
  </div>

  <div class="divider"></div>

  <div class="reports">
    <div class="report-item">
      <a href="./ai_news_日报_20260618.html" class="report-link">
        <div class="report-date">
          <span class="day">18</span>
          06
        </div>
        <div class="report-title">
          AI应用新闻日报 <span class="latest">LATEST</span>
          <span class="weekday">星期三</span>
        </div>
        <div class="report-arrow">→</div>
      </a>
    </div>

    <div class="report-item">
      <a href="./ai_news_日报_20260617.html" class="report-link">
        <div class="report-date">
          <span class="day">17</span>
          06
        </div>
        <div class="report-title">
          AI应用新闻日报
          <span class="weekday">星期二</span>
        </div>
        <div class="report-arrow">→</div>
      </a>
    </div>
  </div>

  <div class="footer">
    <div class="line"></div>
    <p>每日 <span>09:00</span> 自动更新 · Powered by AI</p>
  </div>

</div>
</body>
</html>
